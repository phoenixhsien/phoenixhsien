name: Generate Profile Cards

on:
  schedule:
    - cron: '0 0 * * *'          # 每天 UTC 0 点运行
  workflow_dispatch:              # 允许手动触发
  push:
    branches: [ main ]            # 推送到 main 分支时触发

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write              # 允许提交回仓库
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate cards
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # 安全临时令牌
        run: python scripts/generate_cards.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add stats.svg languages.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "🌙 Auto-update profile cards" && git push)